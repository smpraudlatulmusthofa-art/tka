<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cek Dokumen Peserta</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://unpkg.com/lucide@latest"></script>

<style>

:root{
    --primary:#2563eb;
    --primary2:#3b82f6;
    --success:#10b981;
    --text:#0f172a;
    --muted:#64748b;
    --border:#e2e8f0;
    --card:rgba(255,255,255,.92);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;

    background:
    radial-gradient(circle at top left,#60a5fa 0%,transparent 35%),
    radial-gradient(circle at bottom right,#818cf8 0%,transparent 35%),
    linear-gradient(135deg,#0f172a,#1e293b);
}

.container{

    width:100%;
    max-width:700px;

    background:var(--card);

    backdrop-filter:blur(20px);

    border-radius:32px;

    padding:40px;

    box-shadow:
    0 25px 60px rgba(0,0,0,.25);

    border:1px solid rgba(255,255,255,.2);

}

.logo{
    width:110px;
    height:110px;
    object-fit:contain;
    display:block;
    margin:auto;
}

.school{
    text-align:center;
    margin-top:15px;
}

.school h1{
    font-size:32px;
    color:var(--text);
    font-weight:800;
}

.school p{
    color:var(--muted);
    margin-top:6px;
}

.badges{
    margin-top:18px;
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
}

.badge{
    padding:8px 14px;
    border-radius:999px;
    background:#eff6ff;
    color:#1d4ed8;
    font-size:13px;
    font-weight:600;
}

.search-card{

    margin-top:30px;

    background:white;

    border:1px solid var(--border);

    border-radius:24px;

    padding:24px;
}

.search-title{
    text-align:center;
    font-size:20px;
    font-weight:700;
    color:var(--text);
}

.search-sub{
    text-align:center;
    color:var(--muted);
    margin-top:6px;
    margin-bottom:20px;
}

.search-box{
    display:flex;
    gap:12px;
}

.search-box input{

    flex:1;

    height:58px;

    border:none;

    background:#f8fafc;

    border-radius:16px;

    padding:0 18px;

    font-size:16px;

    outline:none;
}

.search-box button{

    height:58px;

    border:none;

    padding:0 24px;

    border-radius:16px;

    cursor:pointer;

    color:white;

    font-weight:700;

    background:
    linear-gradient(
    135deg,
    var(--primary),
    var(--primary2)
    );

    transition:.25s;
}

.search-box button:hover{
    transform:translateY(-2px);
}

.loading{
    text-align:center;
    margin-top:18px;
    color:var(--muted);
    display:none;
}

.result{

    display:none;

    margin-top:20px;

    border-radius:20px;

    padding:22px;

    background:#f8fafc;

    border:1px solid var(--border);

}

.success{

    display:flex;
    align-items:center;
    gap:10px;

    color:var(--success);

    font-weight:700;

    margin-bottom:18px;
}

.field{
    margin-top:14px;
}

.label{
    font-size:13px;
    color:var(--muted);
}

.value{
    margin-top:4px;
    font-size:17px;
    font-weight:700;
    color:var(--text);
}

.download{

    display:inline-flex;

    align-items:center;

    gap:8px;

    margin-top:22px;

    text-decoration:none;

    color:white;

    background:var(--success);

    padding:14px 22px;

    border-radius:14px;

    font-weight:700;
}

.notfound{

    display:none;

    margin-top:20px;

    padding:18px;

    text-align:center;

    border-radius:16px;

    background:#fef2f2;

    color:#dc2626;

    font-weight:600;
}

.footer{
    text-align:center;
    margin-top:25px;
    color:var(--muted);
    font-size:13px;
}

@media(max-width:640px){

    .container{
        padding:24px;
    }

    .school h1{
        font-size:24px;
    }

    .search-box{
        flex-direction:column;
    }

    .search-box button{
        width:100%;
    }
}

</style>
</head>
<body>

<div class="container">

    <img src="logo.png" class="logo" alt="Logo">

    <div class="school">
        <h1 id="namaSekolah">Memuat...</h1>
        <p>Portal Dokumen Peserta Didik</p>

        <div class="badges">
            <div class="badge" id="npsnBadge">NPSN</div>
            <div class="badge" id="tahunBadge">Tahun Ajaran</div>
        </div>
    </div>

    <div class="search-card">

        <div class="search-title">
            Cari Dokumen Berdasarkan NISN
        </div>

        <div class="search-sub">
            Masukkan NISN peserta untuk melihat dokumen yang tersedia.
        </div>

        <div class="search-box">
            <input
                type="text"
                id="nisn"
                placeholder="Masukkan NISN">
            <button onclick="cariData()">
                Cari Data
            </button>
        </div>

        <div class="loading" id="loading">
            Sedang mencari data...
        </div>

        <div class="notfound" id="notfound">
            Data tidak ditemukan.
        </div>

        <div class="result" id="result">

            <div class="success">
                <i data-lucide="badge-check"></i>
                Data ditemukan
            </div>

            <div class="field">
                <div class="label">NISN</div>
                <div class="value" id="hasilNisn"></div>
            </div>

            <div class="field">
                <div class="label">Nama Peserta</div>
                <div class="value" id="hasilNama"></div>
            </div>

            <a
                id="downloadBtn"
                class="download"
                target="_blank">

                <i data-lucide="download"></i>
                Download Dokumen

            </a>

        </div>

    </div>

    <div class="footer">
        © 2026 Sistem Informasi Dokumen Peserta
    </div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbxin5VLZm6G0pGZxGs8ck_KTaQ5smn4P5KFRNatatUeGxZBQmYUrOrLgzeVdnwl-ms/exec";

async function loadSekolah(){

    try{

        const res = await fetch(API_URL);
        const json = await res.json();

        document.getElementById("namaSekolah").textContent =
            json.sekolah || "-";

        document.getElementById("npsnBadge").textContent =
            "NPSN : " + (json.npsn || "-");

        document.getElementById("tahunBadge").textContent =
            "TA : " + (json.tahun || "-");

    }catch(err){

        console.error(err);

    }
}

async function cariData(){

    const nisn =
        document.getElementById("nisn")
        .value
        .trim();

    if(!nisn) return;

    document.getElementById("loading").style.display="block";
    document.getElementById("result").style.display="none";
    document.getElementById("notfound").style.display="none";

    try{

        const res =
        await fetch(
            API_URL +
            "?nisn=" +
            encodeURIComponent(nisn)
        );

        const json = await res.json();

        document.getElementById("loading").style.display="none";

        if(json.data){

            document.getElementById("hasilNisn").textContent =
                json.data.nisn;

            document.getElementById("hasilNama").textContent =
                json.data.nama;

            document.getElementById("downloadBtn").href =
                json.data.link;

            document.getElementById("result").style.display =
                "block";

        }else{

            document.getElementById("notfound").style.display =
                "block";

        }

        lucide.createIcons();

    }catch(err){

        document.getElementById("loading").style.display="none";
        document.getElementById("notfound").style.display="block";

        console.error(err);
    }
}

document
.getElementById("nisn")
.addEventListener("keypress",function(e){
    if(e.key==="Enter"){
        cariData();
    }
});

loadSekolah();

lucide.createIcons();

</script>

</body>
</html>
